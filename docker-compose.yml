services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: elasticmq
    ports:
      - "9324:9324"
    volumes:
      - "./scripts/elasticmq.conf:/opt/elasticmq.conf"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=sa-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local

  aws-setup:
    image: amazon/aws-cli:latest
    container_name: aws-setup
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=sa-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Aguardando DynamoDB..."
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 --no-cli-pager 2>/dev/null; do
          sleep 2
        done

        echo "Criando tabela DynamoDB..."
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name onboarding-executions \
          --attribute-definitions \
            AttributeName=ID,AttributeType=S \
            AttributeName=CPF,AttributeType=S \
          --key-schema \
            AttributeName=ID,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[{"IndexName":"CPF-index","KeySchema":[{"AttributeName":"CPF","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --no-cli-pager 2>/dev/null || echo "Tabela ja existe, continuando..."

        echo "Infraestrutura pronta."
    restart: "no"
